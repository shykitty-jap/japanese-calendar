<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalendarz japoński</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .cal-wrap { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 860px; }
  .cal-header { text-align: center; margin-bottom: 1.5rem; font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 10px; }
  .day-card { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 12px; padding: 18px 6px; text-align: center; }
  .day-card.today { background: #EEEDFE; border: 2px solid #534AB7; }
  .day-hira { font-size: 16px; font-weight: 500; color: #1a1a1a; line-height: 1.5; }
  .day-card.today .day-hira { color: #3C3489; }
  .day-num { font-size: 28px; font-weight: 500; margin-top: 12px; color: #1a1a1a; }
  .day-card.today .day-num { color: #3C3489; }
</style>
</head>
<body>
<div class="cal-wrap">
  <div class="cal-header" id="month-label"></div>
  <div class="cal-grid" id="cal-grid"></div>
</div>
<script>
const days = [
  'げつ<br>ようび',
  'か<br>ようび',
  'すい<br>ようび',
  'もく<br>ようび',
  'きん<br>ようび',
  'ど<br>ようび',
  'にち<br>ようび',
];

const today = new Date();
const jsToJp = [6, 0, 1, 2, 3, 4, 5];
const todayJp = jsToJp[today.getDay()];

const monday = new Date(today);
monday.setDate(today.getDate() - todayJp);

const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
document.getElementById('month-label').textContent = today.getFullYear() + '年 ' + months[today.getMonth()];

const grid = document.getElementById('cal-grid');
days.forEach((hira, i) => {
  const date = new Date(monday);
  date.setDate(monday.getDate() + i);
  const card = document.createElement('div');
  card.className = 'day-card' + (i === todayJp ? ' today' : '');
  card.innerHTML = `<div class="day-hira">${hira}</div><div class="day-num">${date.getDate()}</div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
